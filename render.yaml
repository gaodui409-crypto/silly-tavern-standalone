services:
  - type: web
    name: taverndb
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 7892
      - key: TEST_API_URL
        sync: false
      - key: TEST_API_KEY
        sync: false
      - key: TEST_MODEL
        value: moonshotai/kimi-k2.5
    disk:
      name: taverndb-data
      mountPath: /data
      sizeGB: 1
